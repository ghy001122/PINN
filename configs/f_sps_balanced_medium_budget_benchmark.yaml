# Balanced F-SPS-PINN medium-budget planning benchmark.
# Synthetic numerical digital-twin benchmark only; not a formal performance claim.
train_data: data/processed/gt_v1_acceptance/gt_triangle.npz
sparse_obs: data/processed/gt_v1_acceptance/obs_triangle_sparse.npz
manifest: data/processed/gt_v1_acceptance/manifest.json
output_root: outputs/pinn_inverse_v2/f_sps_balanced_medium_budget
summary_json: outputs/tables/f_sps_balanced_medium_budget_benchmark_summary.json
cases_csv: outputs/tables/f_sps_balanced_medium_budget_benchmark_cases.csv

device: cpu
lr: 1.0e-3
hidden_dim: 32
hidden_layers: 2
fourier_scales: [1.0, 2.0, 4.0]
epochs: [20, 100, 300]
seeds: [2026, 2027, 2028]
execute_seed_count_per_model_epoch: 1

model_bounds:
  c_v_min: 0.0
  c_v_max: 0.2
  delta_T_max: 20.0
  sigma_min: 1.0e-6
  sigma_max: 1.0

loss_weights:
  w_port_g: 1.0
  w_port_i: 0.5
  w_field_anchor: 0.05
  w_smooth: 1.0e-4
  w_dynamic_gate: 0.0
  w_frequency: 0.0

field_anchor_points: 128

models:
  - model_name: free_log_sigma_pinn
    conductivity_mode: free_log_sigma
    fourier_enabled: false
    dynamic_gate_enabled: false
    enabled: true
  - model_name: white_box_vo2_sigma_pinn
    conductivity_mode: white_box_vo2_sigma
    fourier_enabled: false
    dynamic_gate_enabled: false
    enabled: true
  - model_name: white_box_vo2_sigma_fourier
    conductivity_mode: white_box_vo2_sigma
    fourier_enabled: true
    dynamic_gate_enabled: false
    enabled: true
  - model_name: f_sps_pinn
    conductivity_mode: white_box_vo2_sigma
    fourier_enabled: true
    dynamic_gate_enabled: false
    enabled: true

vo2_params:
  T_c: 313.0
  transition_width: 5.0
  transition_width_min: 0.5
  T_ref: 300.0
  c_v_ref: 0.08
  sigma_ins0: 0.0025
  sigma_met0: 0.03
  E_ins_eV: 0.05
  beta_c: 2.0
  metal_temp_coeff: 0.0
  mixing_mode: linear
  eps_sigma: 1.0e-12
  sigma_max: 1.0

claim_boundary: >
  Balanced medium-budget evidence checks whether all model labels and epoch
  budgets are represented. It does not establish F-SPS-PINN superiority.
