benchmark: "Frozen Ground Truth v1.1 triangle synthetic numerical digital-twin benchmark"
target_npz: data/processed/gt_v1_acceptance/gt_triangle.npz
sparse_obs_npz: data/processed/gt_v1_acceptance/obs_triangle_sparse.npz
summary_json: outputs/tables/gamma_sub_tsw_confounding_phase_map_summary.json
cases_csv: outputs/tables/gamma_sub_tsw_confounding_phase_map_cases.csv
report_md: docs/codex_reports/gamma_sub_tsw_confounding_phase_map_report.md

simulation:
  protocol: triangle
  nx: 31
  nt: 400
  method: Radau
  rtol: 1.0e-5
  atol: 1.0e-7

inverse:
  primary_parameter: gamma_sub
  gamma_candidates: [1.5e8, 2.0e8, 2.75e8, 3.25e8, 3.75e8, 4.0e8, 4.25e8, 4.5e8, 4.75e8, 5.0e8, 5.5e8, 6.5e8, 7.5e8, 9.0e8, 1.0e9]
  recoverable_relative_error_thresholds: [0.1, 0.2]

loss:
  w_g: 1.0
  w_i: 0.5
  w_heat: 0.01
  w_temperature_anchor: 0.0

sweep:
  T_sw_delta_K: [0.0, 0.04, 0.1, 0.2, 0.4, 1.0, 2.0]
  T_sw_prior_widths: [0.02, 0.05, 0.1, 0.2, 0.5, 1.0]
  T_sw_direction: 1
  residual_delta_model: "effective_T_sw_delta_K = T_sw_delta_K * T_sw_prior_width"
