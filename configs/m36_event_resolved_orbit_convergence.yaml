source_model:
  source_config: configs/vo2_d0a_exact_source_v2.yaml
  discrete_semantics_name: source_compatible_threshold_sampled_explicit_euler
  continuous_semantics_name: continuous_extremum_root_located_hysteresis_reference
  semantics_are_identical: false
  shared_physical_rhs: true
  distinction: >-
    The source-compatible family updates T_last on discrete samples and changes
    branch only after a sampled temperature increment exceeds 0.01 K. The
    independent reference root-locates a thermal extremum and applies the same
    0.01 K reversal delay continuously. Agreement must be demonstrated; it is
    not assumed from the shared constitutive law.
  source_event_order:
    - update_sampled_reversal_ledger_at_step_start
    - evaluate_resistance_and_rhs_on_current_branch
    - record_pre_update_state
    - explicit_euler_state_update
  continuous_event_order:
    - integrate_branch_with_fixed_ledger
    - root_locate_temperature_boundary_crossings
    - root_locate_thermal_extremum
    - integrate_to_exact_0p01K_reversal_delay
    - evaluate_old_branch_fraction_at_event_state
    - update_history_ledger_then_resume_rhs

