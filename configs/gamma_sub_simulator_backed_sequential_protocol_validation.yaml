# Simulator-backed sequential protocol validation for constrained gamma_sub.
# Every target and candidate profile in the official run is generated by the
# existing ODE simulator, not by response-surface lookup.
benchmark: gamma_sub_simulator_backed_sequential_protocol_validation
target_npz: data/processed/gt_v1_acceptance/gt_triangle.npz
sparse_obs_npz: data/processed/gt_v1_acceptance/obs_triangle_sparse.npz
summary_json: outputs/tables/gamma_sub_simulator_backed_sequential_protocol_validation_summary.json
cases_csv: outputs/tables/gamma_sub_simulator_backed_sequential_protocol_validation_cases.csv
reference_sequential_summary: outputs/tables/gamma_sub_sequential_protocol_design_summary.json
simulation:
  nx: 9
  nt: 60
  method: Radau
  rtol: 1.0e-4
  atol: 1.0e-6
inverse:
  primary_parameter: gamma_sub
  gamma_candidates: [3.75e8, 4.25e8, 4.5e8, 5.0e8, 5.5e8, 6.5e8, 1.0e9]
  success_relative_error_threshold: 0.15
loss:
  w_g: 1.0
  w_i: 0.5
  w_heat: 0.01
scenarios:
  - scenario: narrow_T_sw_prior
    T_sw_delta_K: 2.0
    T_sw_prior_width: 0.1
  - scenario: literature_bounded_T_sw_prior
    T_sw_delta_K: 2.0
    T_sw_prior_width: 0.05
  - scenario: wide_T_sw_mismatch
    T_sw_delta_K: 2.0
    T_sw_prior_width: 1.0
noise_levels: [0.0, 0.02]
seeds: [2026, 2027, 2028, 2029, 2030]
observation_count: 16
protocol_candidates:
  - candidate_name: multi_pulse_to_ltp_ltd
    simulator_protocol: ltp_ltd
    t_max: 0.015
    prior_width_factor: 0.45
    ltp_v_pos: 0.10
    ltp_v_neg: -0.03
  - candidate_name: short_pulse_to_ltp_ltd
    simulator_protocol: ltp_ltd
    t_max: 0.012
    prior_width_factor: 0.70
    ltp_v_pos: 0.08
    ltp_v_neg: -0.02
  - candidate_name: ltp_ltd_only
    simulator_protocol: ltp_ltd
    t_max: 0.015
    prior_width_factor: 1.00
    ltp_v_pos: 0.08
    ltp_v_neg: -0.02
  - candidate_name: short_pulse_only
    simulator_protocol: ltp_ltd
    t_max: 0.006
    prior_width_factor: 1.00
    ltp_v_pos: 0.08
    ltp_v_neg: -0.02
  - candidate_name: best_single_protocol_only
    simulator_protocol: ltp_ltd
    t_max: 0.006
    prior_width_factor: 1.00
    ltp_v_pos: 0.08
    ltp_v_neg: -0.02
claim_boundary: >
  Sequential protocol validation here is simulator-backed for each constrained
  candidate profile, but stage-one prior narrowing is still a synthetic
  protocol-design assumption, not experimental proof.
