quarantine:
  sealed_member_patterns:
    - experiment_13v
    - 13v
    - 13_v
    - 13 v
  author_code_extensions:
    - .py
    - .md
    - .txt
    - .yaml
    - .yml
  author_code_names:
    - LICENSE
    - README.md
  never_extract_prelock:
    - data.zip
  fit_lock_path: outputs/tables/vo2_d0b_fit_lock.json

source_semantics:
  raw_units:
    voltage: V
    resistance: kOhm
    capacitance: pF
    time: ns
    power: mW
    temperature: K
  algorithm: explicit_euler_or_euler_maruyama
  dt_ns: 10.0
  temperature_clip_K: [305.0, 370.0]
  reversal_delta_T_threshold_K: 0.01
  initial_temperature_offset_K: -0.1
  parameters:
    w_K: 7.19357064
    T_c_K: 332.805839
    beta_per_K: 0.252796285
    R0_ohm: 0.00535882879
    E_a_K: 5220.47417
    gamma_per_K: 0.956269682
    Rm0_ohm: 262.5
    Rm_factor: 4.90025335
    C_F: 1.4534619293e-10
    C_th_J_per_K: 4.962776831e-11
    S_th_W_per_K: 2.0558726e-4
    T_base_K: 325.0
    R_load_ohm: 12000.0
    noise_strength: 0.001
    Cth_factor: 1.0
    couple_factor: 0.0

parity_mve:
  voltage_V: 11.0
  t_max_ns: 60000.0
  dt_values_ns: [10.0, 5.0, 2.5]
  noise_strength: 0.0
  seed: 20260715
  maximum_forward_evaluations: 60

measurement_semantics:
  current_channel: CH3
  current_channel_input_impedance_ohm: 50.0
  voltage_channel: CH4
  voltage_channel_input_impedance_ohm: 1.0e6
  primary_time_window_us: [0.0, 60.0]
  apply_baseline_subtraction: false
  apply_phase_shift_or_dtw: false

gates:
  source_compat_nrmse_max: 1.0e-6
  source_compat_event_count_exact: true
  source_compat_event_time_dt_max: 1.0
  finest_dt_nrmse_max: 0.01
  require_all_provenance_fields: true
  require_license_separation: true
  forbid_13v_member_extraction_before_fit_lock: true

claim_boundary:
  allowed: >
    Source-paper model reproduction and a repository SI semantic-equivalence
    audit under the declared public-source and numerical protocol.
  forbidden: >
    Independent external validation, project-generated experimental validation,
    unique raw-parameter recovery, or validation of the frozen synthetic GT.
