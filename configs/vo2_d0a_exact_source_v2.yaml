paths:
  external_root: data/external/vo2_zhang_2024
  raw_dir: data/external/vo2_zhang_2024/raw
  allowed_extract_dir: data/external/vo2_zhang_2024/raw/allowed_prelock
  sealed_dir: data/external/vo2_zhang_2024/sealed/13v
