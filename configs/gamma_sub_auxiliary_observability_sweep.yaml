benchmark: "Frozen Ground Truth v1.1 triangle synthetic numerical digital-twin benchmark"
target_npz: data/processed/gt_v1_acceptance/gt_triangle.npz
sparse_obs_npz: data/processed/gt_v1_acceptance/obs_triangle_sparse.npz
summary_json: outputs/tables/gamma_sub_auxiliary_observability_sweep_summary.json
cases_csv: outputs/tables/gamma_sub_auxiliary_observability_sweep_cases.csv
report_md: docs/codex_reports/gamma_sub_auxiliary_observability_sweep_report.md

simulation:
  protocol: triangle
  nx: 31
  nt: 400
  method: Radau
  rtol: 1.0e-5
  atol: 1.0e-7

inverse:
  primary_parameter: gamma_sub
  gamma_candidates: [1.5e8, 2.0e8, 2.75e8, 3.25e8, 3.75e8, 4.0e8, 4.25e8, 4.5e8, 4.75e8, 5.0e8, 5.5e8, 6.5e8, 7.5e8, 9.0e8, 1.0e9]
  recoverable_relative_error_thresholds: [0.1, 0.2]

loss:
  w_g: 1.0
  w_i: 0.5
  w_heat: 0.01

mismatch:
  T_sw_delta_K: 2.0
  T_sw_direction: 1
  note: "Controlled synthetic T_sw mismatch target; not measured calibration error."

sweep:
  observation_modes:
    - port_only
    - port_plus_sparse_T
    - port_plus_dense_T
    - port_plus_T_temporal_derivative_proxy
    - port_plus_m_proxy
    - port_plus_sigma_aggregate_proxy
    - port_plus_calibrated_T_sw
  anchor_counts: [2, 4, 8, 16, 32]
  auxiliary_loss_weights: [0.1, 1.0, 10.0, 100.0]
  noise_levels: [0.0, 0.02]
  seed: 2026
