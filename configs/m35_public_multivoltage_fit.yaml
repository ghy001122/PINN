    - {voltage_V: 9.0, curve_id: zhang_2024_fig1c_experiment_9v, path: "data/external/vo2_zhang_2024/raw/allowed_prelock/Source Data/Fig. 1/Fig. 1c/Experiment_9V.csv"}
    - {voltage_V: 11.0, curve_id: zhang_2024_fig1c_experiment_11v, path: "data/external/vo2_zhang_2024/raw/allowed_prelock/Source Data/Fig. 1/Fig. 1c/Experiment_11V.csv"}
    - {voltage_V: 15.0, curve_id: zhang_2024_fig1c_experiment_15v, path: "data/external/vo2_zhang_2024/raw/allowed_prelock/Source Data/Fig. 1/Fig. 1c/Experiment_15V.csv"}
    - {voltage_V: 17.0, curve_id: zhang_2024_fig1c_experiment_17v, path: "data/external/vo2_zhang_2024/raw/allowed_prelock/Source Data/Fig. 1/Fig. 1c/Experiment_17V.csv"}
