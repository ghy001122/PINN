name: full claim-bearing validation

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for full claim-bearing validation"
        required: false
        default: "manual claim-bearing verification"

permissions:
  contents: read

concurrency:
  group: full-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    runs-on: [self-hosted, windows, pinn-trusted-replay]
    timeout-minutes: 60
    env:
      # Preserve repository-local hermeticity when the sandbox account differs
      # from the Windows worktree owner; do not mutate global Git config.
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Only manual/scheduled full validation verifies historic Git blobs.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Capture clean status and inject exact local replay assets
        shell: powershell
        run: |
          if (-not $env:PINN_LOCAL_REPLAY_ASSET_ROOT) {
            throw "PINN_LOCAL_REPLAY_ASSET_ROOT must point to the external read-only asset pack"
          }
          [IO.File]::WriteAllText(
            "$env:RUNNER_TEMP\git-status-before.txt",
            (git status --porcelain=v1 --untracked-files=all | Out-String).TrimEnd()
          )
          python scripts/verify_local_replay_assets.py `
            --root "$env:PINN_LOCAL_REPLAY_ASSET_ROOT" `
            --manifest "${{ github.workspace }}\configs\local_replay_asset_manifest_v1.json" `
            --copy-to "${{ github.workspace }}" `
            --output "$env:RUNNER_TEMP\asset-copy.json"
          python scripts/verify_local_replay_assets.py `
            --root "${{ github.workspace }}" `
            --manifest "${{ github.workspace }}\configs\local_replay_asset_manifest_v1.json" `
            --output "$env:RUNNER_TEMP\asset-verify.json"
      - name: Full test suite
        run: python -m pytest -q
      - name: Verify immutable historic blobs
        run: python scripts/validate_historical_evidence_manifest.py --verify-history
      - name: Full governance audit without tracked writes
        run: python scripts/audit_project_governance.py --no-write
      - name: Strict tracked JSON parse
        run: python scripts/validate_tracked_json.py
      - name: Confirm detached hermetic replay and no checkout mutation
        shell: powershell
        run: |
          [IO.File]::WriteAllText(
            "$env:RUNNER_TEMP\git-status-after.txt",
            (git status --porcelain=v1 --untracked-files=all | Out-String).TrimEnd()
          )
          python scripts/audit_hermetic_replay.py `
            --root "${{ github.workspace }}" `
            --config configs/m42_qiu_2d_preflight.yaml `
            --expected-commit "${{ github.sha }}" `
            --asset-source-root "$env:PINN_LOCAL_REPLAY_ASSET_ROOT" `
            --status-before "$env:RUNNER_TEMP\git-status-before.txt" `
            --status-after "$env:RUNNER_TEMP\git-status-after.txt" `
            --output "$env:RUNNER_TEMP\m42-hermetic-replay.json"
          git diff --exit-code
