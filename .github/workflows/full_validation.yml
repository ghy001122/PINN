name: full claim-bearing validation

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for full claim-bearing validation"
        required: false
        default: "manual claim-bearing verification"

permissions:
  contents: read

concurrency:
  group: full-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    runs-on: [self-hosted, windows, pinn-trusted-replay]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Only manual/scheduled full validation verifies historic Git blobs.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Verify exact local replay asset pack
        run: python scripts/verify_local_replay_assets.py --output outputs/tables/local_replay_asset_validation.json
      - name: Full test suite
        run: python -m pytest -q
      - name: Verify immutable historic blobs
        run: python scripts/validate_historical_evidence_manifest.py --verify-history
      - name: Full governance audit without tracked writes
        run: python scripts/audit_project_governance.py --no-write
      - name: Strict tracked JSON parse
        run: python scripts/validate_tracked_json.py
      - name: Confirm no tracked mutation
        run: git diff --exit-code -- . ':!outputs/figures/**'
