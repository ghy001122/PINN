name: read-only validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Prompt-29 focused tests
        run: >-
          python -m pytest
          tests/test_n0_cv_e_v3_gate_safety.py
          tests/test_n0_cv_e_v3r_forensics.py
          tests/test_sid_ec_oq_event_geometry.py -q
      - name: Full test suite
        run: python -m pytest -q
      - name: Governance audit
        run: python scripts/audit_project_governance.py
